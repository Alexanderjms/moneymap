<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Vibrant emerald to teal gradient for the app icon background -->
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399" />   <!-- Emerald-400 -->
      <stop offset="100%" stop-color="#059669" />  <!-- Emerald-600 -->
    </linearGradient>

    <!-- Soft drop shadow for the squircle base -->
    <filter id="squircleShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#000000" flood-opacity="0.3" />
    </filter>

    <!-- Drop shadow to make the white icon pop -->
    <filter id="chartShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#04583E" flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- 1. The App Icon Base (Squircle) -->
  <rect x="56" y="56" width="400" height="400" rx="110" 
        fill="url(#iconGrad)" 
        filter="url(#squircleShadow)" />

  <!-- 2. Minimalist White Financial Trend Arrow in the center -->
  <g filter="url(#chartShadow)">
    <!-- The trend line path -->
    <path d="M 140 290 L 220 210 L 290 280 L 380 190" 
          fill="none" 
          stroke="#FFFFFF" 
          stroke-width="38" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
    
    <!-- The Arrowhead (perfectly aligned with the 45-degree trend line) -->
    <path d="M 315 190 L 380 190 L 380 255" 
          fill="none" 
          stroke="#FFFFFF" 
          stroke-width="38" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
  </g>
</svg>
